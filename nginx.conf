server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── React SPA ─────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Auth Service ──────────────────────────────────────────────────────────
    # Frontend calls: /api/auth/api/v1/auth/login
    # Nginx strips /api/auth  →  backend gets /api/v1/auth/login  ✓
    #
    # proxy_cookie_path rewrites Set-Cookie path so the browser stores the
    # refresh cookie under "/" (not "/api/v1") — needed for /auth/refresh.
    location /api/auth/ {
        proxy_pass         http://auth-service:8001/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Forward cookies both ways (required for httpOnly refresh token cookie)
        proxy_pass_header  Set-Cookie;
        proxy_cookie_path  / /;
    }

    # ── SSE notification stream — must come BEFORE /api/tickets/ ─────────────
    # EventSource passes token as ?token= (can't set headers)
    # Buffering must be off for SSE to work through nginx
    location /api/tickets/api/v1/notifications/stream {
        proxy_pass             http://ticket-service:8002/api/v1/notifications/stream;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       Connection        "";
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     3600s;
        chunked_transfer_encoding on;
    }

    # ── Ticket Service ────────────────────────────────────────────────────────
    # Frontend calls: /api/tickets/api/v1/tickets
    # Nginx strips /api/tickets  →  backend gets /api/v1/tickets  ✓
    location /api/tickets/ {
        proxy_pass         http://ticket-service:8002/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Static asset caching ──────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}